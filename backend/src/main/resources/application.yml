spring:
  application:
    name: friendmatch-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/friendmatch?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:friendmatch_user}
    password: ${SPRING_DATASOURCE_PASSWORD:friendpass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        connection:
          characterEncoding: utf8mb4
          useUnicode: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: friendmatch-secret-key-for-jwt-signing-must-be-at-least-256-bits-long-2024
  expiration: 86400000
